##############################################
# Backend + General
##############################################

backend = "glx";
vsync = true;
use-damage = true;

##############################################
# Opacity (Frosted Glass Base)
##############################################

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Werte leicht angepasst für den perfekten Kontrast zwischen Text und Glas
opacity-rule = [
  "85:class_g = 'Polybar'",
  "88:class_g = 'kitty'",
  "88:class_g = 'Alacritty'",
  "85:class_g = 'Rofi'",
  "82:class_g = 'Thunar'",
  "82:class_g = 'Nautilus'",
  "92:class_g = 'Firefox'",
  "85:class_g = 'Pcmanfm'",
  "85:class_g = 'Pavucontrol'",
  "85:class_g = 'Blueman-manager'",
  "90:class_g = 'discord'",
  "92:class_g = 'steam'",
  "88:class_g = 'localsend_app'",
  "88:class_g = 'localsend'",
];

##############################################
# Shadows (Apple Style: Huge & Soft)
##############################################

shadow = true;
shadow-radius = 35;           # Deutlich größer für weichen Verlauf
shadow-opacity = 0.16;        # Sehr dezent, wie bei macOS
shadow-offset-x = -32;        # Perfekt zentriert zum großen Radius
shadow-offset-y = -32;

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'hlwm-frame'",   # HLWM frame borders
  "name = 'Notification'"
];

##############################################
# Blur (The Secret: Dual-Kawase Milchglas)
##############################################

blur-method = "dual_kawase";  # DER wichtigste Wechsel für Apple-Glas
blur-strength = 7;            # Perfekte Balance zwischen Unschärfe und Performance

blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

blur-background-exclude = [
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

##############################################
# Fading (Smooth Transitions)
##############################################

fading = true;
fade-in-step = 0.03;          # Etwas sanfteres Einblenden
fade-out-step = 0.03;
fade-delta = 4;

fade-exclude = [
  "class_g = 'Polybar'",
];

##############################################
# Rounded Corners (macOS Standard)
##############################################

corner-radius = 12;           # 12-14px entspricht exakt den macOS-Fenstern

rounded-corners-exclude = [
  "class_g = 'Polybar'",      # Polybar bleibt flach, außer du nutzt "radius" in Polybar selbst
  "class_g = 'hlwm-frame'"
];

##############################################
# Window Types
##############################################

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.9; focus = true; };
  dock = { shadow = false; blur-background = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; blur-background = true; };
  dropdown_menu = { opacity = 0.95; blur-background = true; };
};

##############################################
# Misc
##############################################

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
unredir-if-possible = true;

