# ==============================================================================
# ✒️ Clean & Minimal Font (JetBrains Mono Nerd Font)
# ==============================================================================
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

# Perfekte, lesbare Standardgröße
font_size        11.0

# Verhindert, dass Symbole oder Icons unschön gestreckt werden
force_ltr        no

# ==============================================================================
# 📺 Transparenz & Milchglas-Effekt (Perfekt für Picom)
# ==============================================================================
background_opacity         0.88
dynamic_background_opacity yes

# ==============================================================================
# 🎨 Minimalistisches Schwarz-Weiß & Dracula Farbschema
# ==============================================================================
background            #000000
foreground            #FFFFFF
cursor                #FFFFFF
cursor_text_color     #000000

selection_background  #44475a
selection_foreground  #ffffff

# Die 16 Terminal-Standardfarben (Monochrom mit Dracula-Akzenten)
color0  #000000
color1  #ff5555
color2  #50fa7b
color3  #f1fa8c
color4  #bd93f9
color5  #ff79c6
color6  #8be9fd
color7  #ffffff

color8  #4d4d4d
color9  #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff

# ==============================================================================
# ⚙️ Fenster-Styling & Komfort
# ==============================================================================
# Angenehmer Innenabstand zum Rand
window_padding_width 10

# Audio-Bell bleibt wie gewünscht eingeschaltet
enable_audio_bell yes
